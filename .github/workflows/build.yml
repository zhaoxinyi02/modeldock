name: Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'V*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyyaml pyinstaller

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Ensure Inno Setup
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup --yes --no-progress }

      - name: Download CLIProxyAPI runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force assets | Out-Null
          $release = gh release view --repo router-for-me/CLIProxyAPI --json assets | ConvertFrom-Json
          $asset = $release.assets | Where-Object { $_.name -like "CLIProxyAPI_*_windows_amd64.zip" } | Select-Object -First 1
          if (-not $asset) { throw "CLIProxyAPI windows amd64 asset not found" }
          gh release download --repo router-for-me/CLIProxyAPI --pattern $asset.name --dir assets --clobber
          Expand-Archive -LiteralPath (Join-Path assets $asset.name) -DestinationPath assets/cliproxy -Force
          $exe = Get-ChildItem assets/cliproxy -Recurse -Filter cli-proxy-api.exe | Select-Object -First 1
          if (-not $exe) { throw "cli-proxy-api.exe not found in archive" }
          Copy-Item -LiteralPath $exe.FullName -Destination assets/cli-proxy-api.exe -Force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject built-in free model key
        shell: pwsh
        env:
          BUILTIN_GLM_API_KEY: ${{ secrets.BUILTIN_GLM_API_KEY }}
        run: |
          if (-not $env:BUILTIN_GLM_API_KEY) { throw "Missing BUILTIN_GLM_API_KEY repository secret" }
          $escaped = $env:BUILTIN_GLM_API_KEY.Replace('\', '\\').Replace('"', '\"')
          Set-Content -LiteralPath src/secrets_runtime.py -Encoding UTF8 -Value "BUILTIN_GLM_API_KEY = `"$escaped`""

      - name: Build WinUI application and installer
        shell: pwsh
        run: |
          $version = (python -c "import sys; sys.path.insert(0,'src'); from constants import APP_VERSION; print(APP_VERSION)").Trim()
          .\scripts\build_windows_native.ps1 -VersionTag $version

      - name: Smoke test installed WinUI application
        shell: pwsh
        run: |
          $version = (python -c "import sys; sys.path.insert(0,'src'); from constants import APP_VERSION; print(APP_VERSION)").Trim()
          $setup = Join-Path $PWD "dist\ModelDock_${version}_Windows_x64_Setup.exe"
          $install = Join-Path $env:RUNNER_TEMP "ModelDock-Smoke"
          $process = Start-Process -FilePath $setup -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/DIR=$install" -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Setup smoke install failed: $($process.ExitCode)" }
          $backend = Join-Path $install "Backend\ModelDockBackend.exe"
          $backendOutput = '{}' | & $backend snapshot
          if ($LASTEXITCODE -ne 0) { throw "Backend snapshot process failed: $backendOutput" }
          $json = $backendOutput | ConvertFrom-Json
          Write-Host "Backend smoke version: $($json.result.version); expected: $version; ok: $($json.ok)"
          if ($json.ok -ne $true -or [string]$json.result.version -ne [string]$version) { throw "Backend snapshot smoke test failed." }
          $app = Start-Process -FilePath (Join-Path $install "ModelDock.exe") -PassThru
          Start-Sleep -Seconds 8
          if ($app.HasExited) {
            Get-WinEvent -FilterHashtable @{ LogName = 'Application'; StartTime = (Get-Date).AddMinutes(-3) } -ErrorAction SilentlyContinue |
              Where-Object { $_.Message -match 'ModelDock|Microsoft.UI.Xaml|CoreMessaging|WinUI' } |
              Select-Object -First 8 TimeCreated, ProviderName, Id, LevelDisplayName, Message |
              Format-List | Out-String | Write-Host
            throw "WinUI app exited during startup: $($app.ExitCode)"
          }
          Stop-Process -Id $app.Id -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModelDock-Windows-x64
          path: dist/ModelDock_V*_Windows_x64_Setup.exe

  build-macos:
    name: macOS Apple Silicon
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Inject built-in free model key
        env:
          BUILTIN_GLM_API_KEY: ${{ secrets.BUILTIN_GLM_API_KEY }}
        run: |
          test -n "$BUILTIN_GLM_API_KEY"
          python - <<'PY'
          import json, os
          with open("src/secrets_runtime.py", "w", encoding="utf-8") as handle:
              handle.write("BUILTIN_GLM_API_KEY = " + json.dumps(os.environ["BUILTIN_GLM_API_KEY"]) + "\n")
          PY

      - name: Build application and DMG
        run: ./scripts/build_macos.sh

      - name: Verify application and DMG
        run: |
          codesign --verify --deep --strict dist/ModelDock.app
          hdiutil verify dist/ModelDock_*_macOS_arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModelDock-macOS-arm64
          path: dist/*_macOS_arm64.dmg

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/V')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*_Windows_x64_Setup.exe
            dist/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
