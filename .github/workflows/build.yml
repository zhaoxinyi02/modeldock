name: Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'V*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Download CLIProxyAPI runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force assets | Out-Null
          $release = gh release view --repo router-for-me/CLIProxyAPI --json assets | ConvertFrom-Json
          $asset = $release.assets | Where-Object { $_.name -like "CLIProxyAPI_*_windows_amd64.zip" } | Select-Object -First 1
          if (-not $asset) { throw "CLIProxyAPI windows amd64 asset not found" }
          gh release download --repo router-for-me/CLIProxyAPI --pattern $asset.name --dir assets --clobber
          Expand-Archive -LiteralPath (Join-Path assets $asset.name) -DestinationPath assets/cliproxy -Force
          $exe = Get-ChildItem assets/cliproxy -Recurse -Filter cli-proxy-api.exe | Select-Object -First 1
          if (-not $exe) { throw "cli-proxy-api.exe not found in archive" }
          Copy-Item -LiteralPath $exe.FullName -Destination assets/cli-proxy-api.exe -Force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject built-in free model key
        shell: pwsh
        env:
          BUILTIN_GLM_API_KEY: ${{ secrets.BUILTIN_GLM_API_KEY }}
        run: |
          if (-not $env:BUILTIN_GLM_API_KEY) { throw "Missing BUILTIN_GLM_API_KEY repository secret" }
          $escaped = $env:BUILTIN_GLM_API_KEY.Replace('\', '\\').Replace('"', '\"')
          Set-Content -LiteralPath src/secrets_runtime.py -Encoding UTF8 -Value "BUILTIN_GLM_API_KEY = `"$escaped`""

      - name: Build executable
        run: |
          pyinstaller build.spec --noconfirm

      - name: Rename with version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          cp dist/ModelDock.exe "dist/ModelDock_${VERSION}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModelDock-Windows-x64
          path: dist/ModelDock_V*.exe

  build-macos:
    name: macOS Apple Silicon
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Inject built-in free model key
        env:
          BUILTIN_GLM_API_KEY: ${{ secrets.BUILTIN_GLM_API_KEY }}
        run: |
          test -n "$BUILTIN_GLM_API_KEY"
          python - <<'PY'
          import json, os
          with open("src/secrets_runtime.py", "w", encoding="utf-8") as handle:
              handle.write("BUILTIN_GLM_API_KEY = " + json.dumps(os.environ["BUILTIN_GLM_API_KEY"]) + "\n")
          PY

      - name: Build application and DMG
        run: ./scripts/build_macos.sh

      - name: Verify application and DMG
        run: |
          codesign --verify --deep --strict dist/ModelDock.app
          hdiutil verify dist/ModelDock_*_macOS_arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModelDock-macOS-arm64
          path: dist/*_macOS_arm64.dmg

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/V')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
